apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: laxmireddy870113/frontend:latest
          ports:
            - containerPort: 4000
          env:
            - name: BACKEND_URL

              value: http://backend-svc:5000/api/message

